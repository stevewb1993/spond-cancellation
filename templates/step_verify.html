{% extends "base.html" %}
{% block title %}Enter Verification Code{% endblock %}
{% block content %}
<h1>Check your email</h1>
<div class="card">
    <p>We've sent a 6-digit verification code to
       <strong>{{ email }}</strong>. Enter it below to continue.</p>
    <form method="POST">
        <label for="code">Verification code</label>
        <input type="text" id="code" name="code" required
               inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code"
               placeholder="123456">
        <button type="submit" class="btn btn-primary">Verify</button>
    </form>
</div>
<div class="nav" style="margin-top: 1rem;">
    <a href="{{ url_for('step_email') }}">&larr; Use a different email / resend code</a>
</div>
{% endblock %}
