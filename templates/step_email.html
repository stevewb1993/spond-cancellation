{% extends "base.html" %}
{% block title %}Request Session Transfer{% endblock %}
{% block content %}
<h1>Request Session Transfer</h1>
<div class="card">
    <p>Cancelled a session? Enter your email to get started.</p>
    <form method="POST">
        <label for="member_email">Your Email</label>
        <input type="email" id="member_email" name="member_email" required
               placeholder="As registered in Spond">
        <button type="submit" class="btn btn-primary">Next</button>
    </form>
</div>
{% endblock %}
