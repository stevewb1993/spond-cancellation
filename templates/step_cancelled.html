{% extends "base.html" %}
{% block title %}Select Cancelled Session{% endblock %}
{% block content %}
<h1>Which session did you cancel?</h1>
<div class="card">
    <p>We found the following paid sessions that you've cancelled:</p>
    <form method="POST">
        {% for event in events %}
        <label class="radio-option">
            <input type="radio" name="cancelled_event" value="{{ event.event_id }}" required>
            {{ event.label }}
        </label>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Next</button>
    </form>
</div>
<div class="nav" style="margin-top: 1rem;">
    <a href="{{ url_for('step_email') }}">&larr; Back</a>
</div>
{% endblock %}
